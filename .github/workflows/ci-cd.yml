name: Todo App CI/CD

# ─────────────────────────────────────────────
# TRIGGERS
# This section defines EXACTLY when pipeline runs
# ─────────────────────────────────────────────
on:
  # Run when code is pushed to these branches
  push:
    branches:
      - main        # Production deployment
      - develop     # Staging deployment
      - feature     # Tests only

  # IMPORTANT: Also run when Pull Request is opened
  # This checks code BEFORE it merges
  # Real companies require this to pass before merge
  pull_request:
    branches:
      - main        # PR targeting main
      - develop     # PR targeting develop

# ─────────────────────────────────────────────
# GLOBAL VARIABLES
# ─────────────────────────────────────────────
env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/todo-app

jobs:

  # ══════════════════════════════════════════
  # JOB 1: TEST
  # Runs on: ALL branches + ALL pull requests
  # Purpose: Catch broken code immediately
  # ══════════════════════════════════════════
  test:
    name: ✅ Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest test_todo.py -v

      - name: Check coverage
        run: |
          pytest --cov=todo --cov-report=term-missing
          # In real companies minimum 80% coverage required

  # ══════════════════════════════════════════
  # JOB 2: LINT
  # Runs on: ALL branches + ALL pull requests
  # Purpose: Enforce code quality standards
  # ══════════════════════════════════════════
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    needs: test
    # needs: test means lint only runs if tests pass
    # No point checking quality of broken code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run linter
        run: flake8 todo.py app.py --max-line-length=100

  # ══════════════════════════════════════════
  # JOB 3: BUILD
  # Runs on: ALL branches + ALL pull requests
  # Purpose: Verify app can be packaged
  # ══════════════════════════════════════════
  build:
    name: 🔨 Build Package
    runs-on: ubuntu-latest
    needs: [test, lint]
    # Both test AND lint must pass before build starts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m py_compile todo.py
          python -m py_compile app.py
          echo "✅ All files compiled successfully"

      - name: Build package
        run: |
          pip install build
          python -m build --wheel
          echo "✅ Package built successfully"

      - name: Save package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-package
          path: dist/
          retention-days: 7

  # ══════════════════════════════════════════
  # JOB 4: DOCKER STAGING
  # Runs on: develop branch ONLY
  # NOT on: feature, main, or pull requests
  # Purpose: Build staging image for testing
  # ══════════════════════════════════════════
  docker-staging:
    name: 🐳 Docker Build Staging
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/develop' &&
      github.event_name == 'push'
    # github.event_name == 'push' means:
    # only run on ACTUAL push to develop
    # NOT on pull requests targeting develop
    # This prevents staging deploy on unmerged code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:staging
            ${{ env.DOCKER_IMAGE }}:staging-${{ github.sha }}
          # Two tags:
          # :staging       → always newest staging version
          # :staging-abc123 → this exact commit for rollback

      - name: Confirm image pushed
        run: |
          echo "✅ Staging image pushed to Docker Hub!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}:staging"
          echo "🔖 Commit: ${{ env.DOCKER_IMAGE }}:staging-${{ github.sha }}"

  # ══════════════════════════════════════════
  # JOB 5: DEPLOY STAGING
  # Runs on: develop branch ONLY
  # Purpose: Deploy to staging server
  # ══════════════════════════════════════════
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-staging
    if: |
      github.ref == 'refs/heads/develop' &&
      github.event_name == 'push'

    steps:
      - name: Trigger Render staging deployment
        run: |
          curl -X POST "${{ secrets.RENDER_STAGING_HOOK }}"
          echo "✅ Staging deployment triggered!"

      - name: Print deployment info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌍 STAGING DEPLOYMENT COMPLETE"
          echo "📦 ${{ env.DOCKER_IMAGE }}:staging"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ══════════════════════════════════════════
  # JOB 6: DOCKER PRODUCTION
  # Runs on: main branch ONLY
  # NOT on: feature, develop, or pull requests
  # Purpose: Build production image
  # ══════════════════════════════════════════
  docker-production:
    name: 🐳 Docker Build Production
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    # Only on actual push to main
    # NOT on pull requests targeting main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Confirm image pushed
        run: |
          echo "✅ Production image pushed to Docker Hub!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}:latest"
          echo "🔖 Commit: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"

  # ══════════════════════════════════════════
  # JOB 7: DEPLOY PRODUCTION
  # Runs on: main branch ONLY
  # Purpose: Deploy to production server
  # In real companies this has manual approval
  # ══════════════════════════════════════════
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-production
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'

    steps:
      - name: Trigger Render production deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✅ Production deployment triggered!"

      - name: Print deployment info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌍 PRODUCTION DEPLOYMENT COMPLETE"
          echo "📦 ${{ env.DOCKER_IMAGE }}:latest"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"